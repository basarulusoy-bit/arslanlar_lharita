<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewels 2. KAT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#C9A96E;--black:#0A0A0A;--b2:#111;--b3:#181818;--white:#F5F0E8;--wd:rgba(245,240,232,0.6);--border:rgba(201,169,110,0.2);--green:#5DBD84;--orange:#E8A96E;--red:#E87070;}
html,body{height:100%;overflow:hidden;background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:300;}
.wrap{display:flex;flex-direction:column;height:100%;}
.toolbar{flex-shrink:0;padding:7px 12px;background:var(--b2);border-bottom:1px solid var(--border);display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.kat-title{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);margin-right:6px;white-space:nowrap;}
.fbtn{background:none;border:1px solid var(--border);color:var(--wd);padding:3px 9px;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .15s;}
.fbtn.active,.fbtn:hover{background:rgba(201,169,110,.18);border-color:var(--gold);color:var(--gold);}
.legend{display:flex;gap:8px;margin-left:auto;font-size:9px;color:var(--wd);align-items:center;flex-wrap:wrap;}
.ld{width:8px;height:8px;border-radius:1px;display:inline-block;margin-right:2px;vertical-align:middle;}
.stats{display:flex;gap:10px;padding:4px 12px;background:rgba(0,0,0,.3);font-size:9px;color:var(--wd);flex-shrink:0;border-bottom:1px solid var(--border);}
.st span{font-family:'Cormorant Garamond',serif;font-size:14px;margin-left:2px;color:var(--gold);}
.body{flex:1;display:flex;overflow:hidden;min-height:0;}
.plan-area{flex:1;overflow:auto;padding:8px;display:flex;align-items:flex-start;justify-content:flex-start;}
.plan-area::-webkit-scrollbar{width:4px;height:4px;}
.plan-area::-webkit-scrollbar-thumb{background:rgba(201,169,110,.2);border-radius:2px;}
svg.fp{display:block;max-width:100%;height:auto;}
.unit{cursor:pointer;}
.unit polygon{transition:fill-opacity .1s;}
.unit:hover polygon{fill-opacity:1!important;}
.unit.dim{opacity:.2;pointer-events:none;}
.ulbl{font-size:18px;fill:#0A0A0A;fill-opacity:0.85;text-anchor:middle;dominant-baseline:central;pointer-events:none;font-family:Arial,sans-serif;font-weight:700;}
.rpanel{width:0;overflow:hidden;transition:width .25s;background:var(--b2);border-left:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;}
.rpanel.open{width:250px;}
.rp-hdr{padding:14px 14px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
.rp-no{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--gold);line-height:1;}
.rp-tip{font-size:9px;letter-spacing:1.5px;color:var(--wd);text-transform:uppercase;margin-top:2px;}
.rp-close{background:none;border:none;color:var(--wd);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1;}
.rp-close:hover{color:var(--white);}
.rp-body{flex:1;padding:12px 14px;overflow-y:auto;}
.sbadge{display:inline-block;padding:3px 10px;font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;border-radius:2px;}
.s-av{background:rgba(93,189,132,.15);color:var(--green);border:1px solid rgba(93,189,132,.3);}
.s-pe{background:rgba(201,169,110,.15);color:var(--gold);border:1px solid rgba(201,169,110,.3);}
.s-re{background:rgba(232,169,110,.12);color:var(--orange);border:1px solid rgba(232,169,110,.25);}
.s-so{background:rgba(232,112,112,.1);color:var(--red);border:1px solid rgba(232,112,112,.2);}
.pi{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(245,240,232,.05);}
.pi-l{font-size:8px;letter-spacing:1.5px;color:var(--wd);text-transform:uppercase;}
.pi-v{font-family:'Cormorant Garamond',serif;font-size:16px;}
.pi-v.gold{color:var(--gold);font-size:18px;}
.rp-btns{padding:10px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.rbtn{padding:10px;text-align:center;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;font-family:'Montserrat',sans-serif;font-weight:500;transition:all .2s;}
.rbtn-gold{background:var(--gold);color:#000;}
.rbtn-gold:hover{background:#E8CC84;}
.rbtn-ghost{background:transparent;border:1px solid var(--border);color:var(--wd);}
.rbtn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.rbtn:disabled{opacity:.3;cursor:default;}
.rform{padding:10px 14px;border-top:1px solid var(--border);display:none;}
.rform.open{display:block;}
.rform-title{font-size:8px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
.rfinput{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(201,169,110,.25);color:var(--white);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:300;padding:7px 4px;outline:none;margin-bottom:7px;}
.rfinput::placeholder{color:rgba(245,240,232,.2);}
.rfinput:focus{border-bottom-color:var(--gold);}
</style>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <span class="kat-title">2. KAT · 1+1 LOFT</span>
    <button class="fbtn active" onclick="flt('all',this)">TÜMÜ</button>
    <button class="fbtn" onclick="flt('available',this)">BOŞ</button>
    <button class="fbtn" onclick="flt('pending',this)">ONAY BEKLİYOR</button>
    <button class="fbtn" onclick="flt('reserved',this)">REZERVE</button>
    <button class="fbtn" onclick="flt('sold',this)">SATILDI</button>
    <div class="legend">
      <span><span class="ld" style="background:#5DBD84"></span>BOŞ</span>
      <span><span class="ld" style="background:#C9A96E"></span>ONAY BEKLİYOR</span>
      <span><span class="ld" style="background:#E8A96E"></span>REZERVE</span>
      <span><span class="ld" style="background:#E87070"></span>SATILDI</span>
    </div>
  </div>
  <div class="stats">
    <div class="st">BOŞ<span id="cB">—</span></div>
    <div class="st">ONAY BEKLİYOR<span id="cP">—</span></div>
    <div class="st">REZERVE<span id="cR">—</span></div>
    <div class="st">SATILDI<span id="cS">—</span></div>
    <div class="st" style="margin-left:auto">TOPLAM<span id="cT">—</span></div>
  </div>
  <div class="body">
    <div class="plan-area" id="planArea">
      <svg class="fp" viewBox="0 0 2040 880" id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="rpanel" id="rpanel">
      <div class="rp-hdr">
        <div>
          <div class="rp-no" id="pNo">—</div>
          <div class="rp-tip">1+1 LOFT</div>
        </div>
        <button class="rp-close" onclick="closePanel()">✕</button>
      </div>
      <div class="rp-body">
        <div id="pBadge"></div>
        <div class="pi"><span class="pi-l">Daire No</span><span class="pi-v" id="pNo2">—</span></div>
        <div class="pi"><span class="pi-l">Tip</span><span class="pi-v">1+1 Loft</span></div>
        <div class="pi"><span class="pi-l">Kat</span><span class="pi-v">2. Kat</span></div>
        <div class="pi"><span class="pi-l">Peşinat</span><span class="pi-v gold">1,000,000 ₺</span></div>
        <div class="pi"><span class="pi-l">Aylık Taksit</span><span class="pi-v gold">59,000 ₺</span></div>
        <div class="pi"><span class="pi-l">Vade</span><span class="pi-v">36 Ay</span></div>
        <div class="pi"><span class="pi-l">Toplam</span><span class="pi-v">3,124,000 ₺</span></div>
        <div id="pExtra" style="margin-top:6px;"></div>
      </div>
      <div class="rform" id="rform">
        <div class="rform-title">Rezervasyon Bilgileri</div>
        <input class="rfinput" id="rfName" placeholder="Müşteri Adı Soyadı *">
        <input class="rfinput" id="rfTel"  placeholder="Telefon *">
        <input class="rfinput" id="rfNote" placeholder="Not (opsiyonel)">
      </div>
      <div class="rp-btns" id="pBtns"></div>
    </div>
  </div>
</div>

const SL={available:'Boş',pending:'Onay Bekliyor',pending_sale:'Onay Bekliyor',reserved:'Rezerve',sold:'Satıldı'};
const SC={available:'s-av',pending:'s-pe',pending_sale:'s-pe',reserved:'s-re',sold:'s-so'};
let US={},CF='all',SEL=null;

async function load(){
  try{
    const r=await fetch(SB+'/rest/v1/jewels_units?select=unit_no,status,customer_name,reserved_by_name&type=eq.'+encodeURIComponent(UT),{headers:{'apikey':SK,'Authorization':'Bearer '+SK}});
    const d=await r.json();
    if(Array.isArray(d))d.forEach(u=>US[u.unit_no]={status:u.status||'available',cus:u.customer_name,agency:u.reserved_by_name});
  }catch(e){}
  render();
}

function render(){
  const svg=document.getElementById('svg');
  let b=0,p=0,r=0,s=0,h='';
  UD.forEach(u=>{
    const d=US[u.no]||{};
    const st=d.status||'available';
    if(st==='available')b++;
    else if(st==='pending'||st==='pending_sale')p++;
    else if(st==='reserved')r++;
    else s++;
    const c=CM[st]||'#5DBD84';
    const pts=u.pts.map(p=>p[0]+','+p[1]).join(' ');
    const dim=(CF!=='all'&&CF!==st&&!(CF==='pending'&&st==='pending_sale'))?' dim':'';
    const sw=(SEL===u.no)?'3':'1.2';
    h+=`<g class="unit${dim}" data-no="${u.no}" data-st="${st}" onclick="sel('${u.no}')">
      <polygon points="${pts}" fill="${c}" fill-opacity="0.82" stroke="rgba(0,0,0,0.5)" stroke-width="${sw}"/>
      <text class="ulbl" x="${u.cx}" y="${u.cy}">${u.no}</text>
    </g>`;
  });
  svg.innerHTML=h;
  document.getElementById('cB').textContent=b;
  document.getElementById('cP').textContent=p;
  document.getElementById('cR').textContent=r;
  document.getElementById('cS').textContent=s;
  document.getElementById('cT').textContent=UD.length;
}

function flt(v,btn){
  CF=v;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.unit').forEach(el=>{
    const st=el.dataset.st;
    el.classList.toggle('dim',v!=='all'&&v!==st&&!(v==='pending'&&st==='pending_sale'));
  });
}

function sel(no){
  SEL=no;
  const d=US[no]||{};
  const st=d.status||'available';
  document.getElementById('pNo').textContent='Daire '+no;
  document.getElementById('pNo2').textContent=no;
  document.getElementById('pBadge').innerHTML='<span class="sbadge '+SC[st]+'">'+SL[st]+'</span>';
  let extra='';
  if(d.cus)extra+='<div class="pi"><span class="pi-l">Müşteri</span><span class="pi-v" style="font-size:13px">'+d.cus+'</span></div>';
  if(d.agency)extra+='<div class="pi"><span class="pi-l">Acenta</span><span class="pi-v" style="font-size:12px;color:var(--wd)">'+d.agency+'</span></div>';
  document.getElementById('pExtra').innerHTML=extra;
  let btns='';
  if(st==='available'){
    btns='<button class="rbtn rbtn-gold" onclick="showForm()">REZERVASYON TALEBİ</button><button class="rbtn rbtn-ghost" onclick="reqSale()">SATIŞ TALEBİ</button>';
  }else if(st==='pending'||st==='pending_sale'){
    btns='<button class="rbtn rbtn-ghost" style="border-color:rgba(232,112,112,.3);color:var(--red)" onclick="cancelReq()">TALEBİ GERİ ÇEK</button>';
  }else if(st==='reserved'){
    btns='<button class="rbtn rbtn-gold" onclick="reqSale()">SATIŞ TALEBİ</button>';
  }else{
    btns='<button class="rbtn rbtn-ghost" disabled>Satıldı</button>';
  }
  document.getElementById('pBtns').innerHTML=btns;
  document.getElementById('rform').classList.remove('open');
  document.getElementById('rpanel').classList.add('open');
  document.querySelectorAll('.unit polygon').forEach(p=>p.setAttribute('stroke-width',p.parentElement.dataset.no===no?'3':'1.2'));
}

function closePanel(){SEL=null;document.getElementById('rpanel').classList.remove('open');document.getElementById('rform').classList.remove('open');document.querySelectorAll('.unit polygon').forEach(p=>p.setAttribute('stroke-width','1.2'));}

function showForm(){document.getElementById('rform').classList.add('open');document.getElementById('rfName').focus();document.getElementById('pBtns').innerHTML='<button class="rbtn rbtn-gold" onclick="submitReserve()">TALEP GÖNDER →</button><button class="rbtn rbtn-ghost" onclick="document.getElementById(\'rform\').classList.remove(\'open\')">İptal</button>';}

async function submitReserve(){
  const name=document.getElementById('rfName').value.trim();
  const tel=document.getElementById('rfTel').value.trim();
  if(!name||!tel){alert('Ad ve telefon zorunludur.');return;}
  const note=document.getElementById('rfNote').value.trim();
  try{
    await fetch(SB+'/rest/v1/jewels_units?unit_no=eq.'+SEL+'&type=eq.'+encodeURIComponent(UT),{
      method:'PATCH',
      headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({status:'pending',customer_name:name,customer_tel:tel,reservation_note:note,reserved_at:new Date().toISOString()})
    });
  }catch(e){alert('Hata: '+e.message);return;}
  US[SEL]={status:'pending',cus:name};
  render();sel(SEL);
  document.getElementById('rform').classList.remove('open');
}

async function reqSale(){
  try{
    await fetch(SB+'/rest/v1/jewels_units?unit_no=eq.'+SEL+'&type=eq.'+encodeURIComponent(UT),{
      method:'PATCH',
      headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({status:'pending_sale',reserved_at:new Date().toISOString()})
    });
  }catch(e){}
  US[SEL]={...US[SEL],status:'pending_sale'};
  render();sel(SEL);
  window.parent.postMessage({type:'jwContract',no:SEL,unitType:UT,floor:2}, '*');
}

async function cancelReq(){
  try{
    await fetch(SB+'/rest/v1/jewels_units?unit_no=eq.'+SEL+'&type=eq.'+encodeURIComponent(UT),{
      method:'PATCH',
      headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({status:'available',customer_name:null,customer_tel:null,reservation_note:null,reserved_at:null})
    });
  }catch(e){}
  US[SEL]={status:'available'};
  render();sel(SEL);
}

load();
</script>
</body>
</html>
