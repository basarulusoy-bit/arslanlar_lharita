<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arslanlar Jewels — ZEMİN KAT — 1+1 LOFT BAHÇELİ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#C9A96E;--black:#0A0A0A;--b2:#111;--b3:#1A1A1A;--white:#F5F0E8;--wd:rgba(245,240,232,0.6);--border:rgba(201,169,110,0.2);--green:#5DBD84;--orange:#E8A96E;--red:#E87070;}
body{background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:300;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{padding:12px 20px;background:var(--b2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-shrink:0;}
.header h1{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--gold);}
.header p{font-size:9px;color:var(--wd);letter-spacing:1.5px;margin-top:2px;}
.legend{display:flex;gap:12px;margin-left:auto;}
.leg{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--wd);letter-spacing:.5px;}
.leg-dot{width:9px;height:9px;border-radius:2px;}
.controls{padding:8px 20px;background:var(--b3);border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-shrink:0;}
.fbtn{background:none;border:1px solid var(--border);color:var(--wd);padding:4px 10px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .2s;}
.fbtn.active,.fbtn:hover{background:rgba(201,169,110,.15);border-color:var(--gold);color:var(--gold);}
.stats{display:flex;gap:14px;margin-left:auto;font-size:9px;}
.stat{color:var(--wd);}.stat span{color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:15px;margin-left:3px;}
.body{display:flex;flex:1;overflow:hidden;}
.plan-wrap{flex:1;overflow:auto;padding:12px;background:var(--black);}
svg.floorplan{background:#0d0d0d;display:block;}
.unit{cursor:pointer;}
.unit polygon{transition:fill-opacity .15s,stroke-width .15s;}
.unit:hover polygon{fill-opacity:0.9!important;}
.unit.hidden{display:none;}
.unit-lbl{font-size:5.5px;fill:rgba(245,240,232,.75);text-anchor:middle;dominant-baseline:central;pointer-events:none;font-family:Montserrat,sans-serif;font-weight:400;}
.panel{width:260px;background:var(--b2);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(260px);transition:transform .28s;flex-shrink:0;}
.panel.open{transform:none;}
.panel-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-no{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);}
.panel-type{font-size:8px;letter-spacing:1.5px;color:var(--wd);margin-top:2px;text-transform:uppercase;}
.panel-close{background:none;border:none;color:var(--wd);font-size:16px;cursor:pointer;padding:4px;}
.panel-body{padding:14px 16px;flex:1;overflow-y:auto;}
.pi{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(245,240,232,.05);}
.pi-l{font-size:8px;letter-spacing:1.5px;color:var(--wd);text-transform:uppercase;}
.pi-v{font-family:'Cormorant Garamond',serif;font-size:15px;}
.pi-v.gold{color:var(--gold);}
.sbadge{display:inline-block;padding:3px 10px;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;}
.s-av{background:rgba(93,189,132,.12);color:var(--green);border:1px solid rgba(93,189,132,.25);}
.s-re{background:rgba(232,169,110,.1);color:var(--orange);border:1px solid rgba(232,169,110,.2);}
.s-so{background:rgba(232,112,112,.08);color:var(--red);border:1px solid rgba(232,112,112,.18);}
.panel-btns{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.pbtn{padding:9px;text-align:center;font-size:8px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;font-family:'Montserrat',sans-serif;transition:all .2s;}
.pbtn-gold{background:var(--gold);color:var(--black);}
.pbtn-gold:hover{background:#E8CC84;}
.pbtn-ghost{background:transparent;border:1px solid var(--border);color:var(--wd);}
.pbtn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.pbtn:disabled{opacity:.35;cursor:default;}
</style>
</head>

const SB_URL='https://lbmzjhvgunkitpatijut.supabase.co';
const SB_KEY='sb_publishable_59-PLGkxMNiaL_lKUXyDbQ_ubzKmEcY';
const UT='1+1 Loft Bahçeli';
const CM={available:'#5DBD84',reserved:'#E8A96E',sold:'#E87070'};
const SL={available:'Boş',reserved:'Rezerve',sold:'Satıldı'};
const SC={available:'s-av',reserved:'s-re',sold:'s-so'};
let US={},CF='all',SEL=null;

async function loadStatus(){
  try{
    const enc=encodeURIComponent(UT);
    const r=await fetch(SB_URL+'/rest/v1/jewels_units?select=unit_no,status&type=eq.'+enc,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const d=await r.json();
    if(Array.isArray(d))d.forEach(u=>US[u.unit_no]=u.status);
  }catch(e){}
  render();
}

function render(){
  const svg=document.getElementById('svg');
  let b=0,r=0,s=0,h='';
  UD.forEach(u=>{
    const st=US[u.no]||'available';
    if(st==='available')b++;else if(st==='reserved')r++;else s++;
    const c=CM[st];
    const pts=u.pts.map(p=>p[0]+','+p[1]).join(' ');
    const hid=(CF!=='all'&&CF!==st)?' hidden':'';
    const sel=(SEL===u.no)?' stroke-width="2.5"':' stroke-width="0.8"';
    h+=`<g class="unit${hid}" data-no="${u.no}" data-st="${st}" onclick="sel('${u.no}')"><polygon points="${pts}" fill="${c}" fill-opacity="0.72" stroke="${c}"${sel}/><text class="unit-lbl" x="${u.cx}" y="${u.cy}">${u.no}</text></g>`;
  });
  svg.innerHTML=h;
  document.getElementById('cB').textContent=b;
  document.getElementById('cR').textContent=r;
  document.getElementById('cS').textContent=s;
  document.getElementById('cT').textContent=UD.length;
}

function flt(v,btn){CF=v;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.unit').forEach(el=>el.classList.toggle('hidden',v!=='all'&&v!==el.dataset.st));}

function sel(no){
  SEL=no;
  const st=US[no]||'available';
  document.getElementById('pNo').textContent='Daire '+no;
  document.getElementById('pNo2').textContent=no;
  document.getElementById('pBadge').innerHTML='<span class="sbadge '+SC[st]+'">'+SL[st]+'</span>';
  let btns='';
  if(st==='available'){btns='<button class="pbtn pbtn-gold" onclick="doReserve()">REZERVE ET</button><button class="pbtn pbtn-ghost" onclick="doContract()">SÖZLEŞME HAZIRLA</button>';}
  else if(st==='reserved'){btns='<button class="pbtn pbtn-gold" onclick="doContract()">SÖZLEŞME HAZIRLA</button><button class="pbtn pbtn-ghost" onclick="doCancel()" style="color:var(--red)">Rezervasyonu Kaldır</button>';}
  else{btns='<button class="pbtn pbtn-ghost" disabled>Satıldı</button>';}
  document.getElementById('pBtns').innerHTML=btns;
  document.getElementById('panel').classList.add('open');
  document.querySelectorAll('.unit polygon').forEach(p=>p.setAttribute('stroke-width',p.parentElement.dataset.no===no?'2.5':'0.8'));
}

function closePanel(){SEL=null;document.getElementById('panel').classList.remove('open');document.querySelectorAll('.unit polygon').forEach(p=>p.setAttribute('stroke-width','0.8'));}

async function doReserve(){
  if(!SEL)return;
  try{await fetch(SB_URL+'/rest/v1/jewels_units?unit_no=eq.'+SEL+'&type=eq.'+encodeURIComponent(UT),{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({status:'reserved'})});}catch(e){}
  US[SEL]='reserved';render();sel(SEL);
}

async function doCancel(){
  if(!SEL)return;
  try{await fetch(SB_URL+'/rest/v1/jewels_units?unit_no=eq.'+SEL+'&type=eq.'+encodeURIComponent(UT),{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({status:'available'})});}catch(e){}
  US[SEL]='available';render();sel(SEL);
}

function doContract(){
  window.parent.postMessage({type:'jwContract',no:SEL,type2:UT,floor:0}, '*');
  if(window === window.top)alert('Sözleşme için acenta panelinden erişin: Daire '+SEL);
}

loadStatus();
