<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewels ZEMİN KAT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#C9A96E;--black:#0A0A0A;--b2:#111;--b3:#181818;--white:#F5F0E8;--wd:rgba(245,240,232,0.6);--border:rgba(201,169,110,0.2);--green:#5DBD84;--orange:#E8A96E;--red:#E87070;}
html,body{height:100%;overflow:hidden;background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:300;}
.wrap{display:flex;flex-direction:column;height:100%;}
.toolbar{flex-shrink:0;padding:8px 12px;background:var(--b2);border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;}
.kat-title{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--gold);margin-right:8px;}
.fbtn{background:none;border:1px solid var(--border);color:var(--wd);padding:4px 10px;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .15s;}
.fbtn.active,.fbtn:hover{background:rgba(201,169,110,.18);border-color:var(--gold);color:var(--gold);}
.legend{display:flex;gap:10px;margin-left:auto;font-size:9px;letter-spacing:.5px;color:var(--wd);align-items:center;}
.ld{width:8px;height:8px;border-radius:1px;display:inline-block;margin-right:3px;}
.stats{display:flex;gap:12px;padding:0 12px;font-size:9px;color:var(--wd);}
.st span{font-family:'Cormorant Garamond',serif;font-size:15px;margin-left:2px;color:var(--gold);}
.body{flex:1;display:flex;overflow:hidden;}
.plan-area{flex:1;overflow:auto;padding:8px;}
.plan-area::-webkit-scrollbar{width:4px;height:4px;}
.plan-area::-webkit-scrollbar-thumb{background:rgba(201,169,110,.2);}
svg.fp{display:block;width:100%;height:auto;}
.unit{cursor:pointer;}
.unit polygon{stroke-width:1.5;transition:fill-opacity .1s;}
.unit:hover polygon{fill-opacity:1!important;stroke-width:2.5!important;}
.unit.dim{opacity:.25;pointer-events:none;}
.ulbl{font-size:14px;fill:rgba(10,10,10,.85);text-anchor:middle;dominant-baseline:central;pointer-events:none;font-family:Montserrat,sans-serif;font-weight:500;}
/* RIGHT PANEL */
.rpanel{width:0;overflow:hidden;transition:width .25s;background:var(--b2);border-left:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;}
.rpanel.open{width:260px;}
.rp-hdr{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
.rp-no{font-family:'Cormorant Garamond',serif;font-size:32px;color:var(--gold);line-height:1;}
.rp-tip{font-size:9px;letter-spacing:1.5px;color:var(--wd);text-transform:uppercase;margin-top:3px;}
.rp-close{background:none;border:none;color:var(--wd);font-size:18px;cursor:pointer;padding:2px 6px;}
.rp-close:hover{color:var(--white);}
.rp-body{flex:1;padding:14px 16px;overflow-y:auto;}
.sbadge{display:inline-block;padding:4px 12px;font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;border-radius:2px;}
.s-av{background:rgba(93,189,132,.15);color:var(--green);border:1px solid rgba(93,189,132,.3);}
.s-pe{background:rgba(201,169,110,.15);color:var(--gold);border:1px solid rgba(201,169,110,.3);}
.s-re{background:rgba(232,169,110,.12);color:var(--orange);border:1px solid rgba(232,169,110,.25);}
.s-so{background:rgba(232,112,112,.1);color:var(--red);border:1px solid rgba(232,112,112,.2);}
.pi{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(245,240,232,.06);}
.pi-l{font-size:8px;letter-spacing:1.5px;color:var(--wd);text-transform:uppercase;}
.pi-v{font-family:'Cormorant Garamond',serif;font-size:16px;}
.pi-v.gold{color:var(--gold);font-size:18px;}
.rp-btns{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.rbtn{padding:11px;text-align:center;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;font-family:'Montserrat',sans-serif;font-weight:500;transition:all .2s;}
.rbtn-gold{background:var(--gold);color:var(--black);}
.rbtn-gold:hover{background:#E8CC84;}
.rbtn-ghost{background:transparent;border:1px solid var(--border);color:var(--wd);}
.rbtn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.rbtn:disabled{opacity:.3;cursor:default;}
/* Rezervasyon formu */
.rform{padding:12px 16px;border-top:1px solid var(--border);display:none;}
.rform.open{display:block;}
.rform-title{font-size:8px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;}
.rfinput{width:100%;background:rgba(255,255,255,.03);border:none;border-bottom:1px solid rgba(201,169,110,.25);color:var(--white);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:300;padding:8px 4px;outline:none;margin-bottom:8px;}
.rfinput::placeholder{color:rgba(245,240,232,.2);}
.rfinput:focus{border-bottom-color:var(--gold);}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>

const CM={available:'#5DBD84',pending:'#C9A96E',reserved:'#E8A96E',sold:'#E87070'};
const SL={available:'Boş',pending:'Onay Bekliyor',reserved:'Rezerve',sold:'Satıldı'};
const SC={available:'s-av',pending:'s-pe',reserved:'s-re',sold:'s-so'};
let US={},CF='all',SEL=null;

async function load(){
  try{
    const enc=encodeURIComponent(UT);
    const r=await fetch(SB+'/rest/v1/jewels_units?select=unit_no,status,customer_name,reserved_by_name&type=eq.'+enc,{headers:{'apikey':SK,'Authorization':'Bearer '+SK}});
    const d=await r.json();
    if(Array.isArray(d))d.forEach(u=>US[u.unit_no]={status:u.status,cus:u.customer_name,agency:u.reserved_by_name});
  }catch(e){}
  render();
}

function render(){
  const svg=document.getElementById('svg');
  let b=0,p=0,r=0,s=0,h='';
  UD.forEach(u=>{
    const d=US[u.no]||{};
    const st=d.status||'available';
    if(st==='available')b++;else if(st==='pending')p++;else if(st==='reserved')r++;else s++;
    const c=CM[st];
    const pts=u.pts.map(p=>p[0]+','+p[1]).join(' ');
    const dim=(CF!=='all'&&CF!==st)?' dim':'';
    const sel=(SEL===u.no)?'stroke-width="3" stroke-opacity="1"':'stroke-width="1.5" stroke-opacity="0.6"';
    h+=`<g class="unit${dim}" data-no="${u.no}" data-st="${st}" onclick="sel('${u.no}')"><polygon points="${pts}" fill="${c}" fill-opacity="0.78" stroke="#000" ${sel}/><text class="ulbl" x="${u.cx}" y="${u.cy}">${u.no}</text></g>`;
  });
  svg.innerHTML=h;
  document.getElementById('cB').textContent=b;
  document.getElementById('cP').textContent=p;
  document.getElementById('cR').textContent=r;
  document.getElementById('cS').textContent=s;
}

function flt(v,btn){
  CF=v;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.unit').forEach(el=>el.classList.toggle('dim',v!=='all'&&v!==el.dataset.st));
}

function sel(no){
  SEL=no;
  const d=US[no]||{};
  const st=d.status||'available';
  document.getElementById('pNo').textContent='Daire '+no;
  document.getElementById('pNo2').textContent=no;
  document.getElementById('pBadge').innerHTML='<span class="sbadge '+SC[st]+'">'+SL[st]+'</span>';
  
  let extra='';
  if(d.cus)extra+='<div class="pi"><span class="pi-l">Müşteri</span><span class="pi-v" style="font-size:13px">'+d.cus+'</span></div>';
  if(d.agency)extra+='<div class="pi"><span class="pi-l">Acenta</span><span class="pi-v" style="font-size:13px">'+d.agency+'</span></div>';
  document.getElementById('pExtra').innerHTML=extra;
  
  let btns='',showForm=false;
  if(st==='available'){
    btns='<button class="rbtn rbtn-gold" onclick="showReserveForm()">REZERVASYON TALEBİ</button><button class="rbtn rbtn-ghost" onclick="reqSale()">SATIŞ TALEBİ</button>';
  }else if(st==='pending'){
    btns='<button class="rbtn rbtn-ghost" style="color:var(--red)" onclick="cancelReq()">TALEBİ GERİ ÇEK</button>';
  }else if(st==='reserved'){
    btns='<button class="rbtn rbtn-gold" onclick="reqSale()">SATIŞ TALEBİ</button>';
  }else{
    btns='<button class="rbtn rbtn-ghost" disabled>Satıldı</button>';
  }
  document.getElementById('pBtns').innerHTML=btns;
  document.getElementById('rform').classList.remove('open');
  document.getElementById('rpanel').classList.add('open');
  
  document.querySelectorAll('.unit polygon').forEach(p=>{p.setAttribute('stroke-width','1.5');p.setAttribute('stroke-opacity','0.6');});
  const el=document.querySelector('.unit[data-no="'+no+'"] polygon');
  if(el){el.setAttribute('stroke-width','3');el.setAttribute('stroke-opacity','1');}
}

function closePanel(){
  SEL=null;
  document.getElementById('rpanel').classList.remove('open');
  document.getElementById('rform').classList.remove('open');
  document.querySelectorAll('.unit polygon').forEach(p=>{p.setAttribute('stroke-width','1.5');p.setAttribute('stroke-opacity','0.6');});
}

function showReserveForm(){
  document.getElementById('rform').classList.add('open');
  document.getElementById('rfName').focus();
  document.getElementById('pBtns').innerHTML='<button class="rbtn rbtn-gold" onclick="submitReserve()">TALEP GÖNDER →</button><button class="rbtn rbtn-ghost" onclick="document.getElementById(\'rform\').classList.remove(\'open\')">İptal</button>';
}

  const note=document.getElementById('rfNote').value.trim();
  try{
    await fetch(SB+'/rest/v1/jewels_units?unit_no=eq.'+SEL+'&type=eq.'+encodeURIComponent(UT),{
      method:'PATCH',
      headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({status:'pending',customer_name:name,customer_tel:tel,reservation_note:note,reserved_at:new Date().toISOString()})
    });
  }catch(e){}
  US[SEL]={status:'pending',cus:name};
  render();sel(SEL);
  document.getElementById('rform').classList.remove('open');
}

async function reqSale(){
  const name=document.getElementById('rfName')?.value||US[SEL]?.cus||'';
  try{
    await fetch(SB+'/rest/v1/jewels_units?unit_no=eq.'+SEL+'&type=eq.'+encodeURIComponent(UT),{
      method:'PATCH',
      headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({status:'pending_sale',reserved_at:new Date().toISOString()})
    });
  }catch(e){}
  US[SEL]={...US[SEL],status:'pending_sale'};
  render();sel(SEL);
  window.parent.postMessage({type:'jwContract',no:SEL,unitType:UT,floor:0}, '*');
}

async function cancelReq(){
  try{
    await fetch(SB+'/rest/v1/jewels_units?unit_no=eq.'+SEL+'&type=eq.'+encodeURIComponent(UT),{
      method:'PATCH',
      headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({status:'available',customer_name:null,customer_tel:null,reservation_note:null})
    });
  }catch(e){}
  US[SEL]={status:'available'};
  render();sel(SEL);
}

load();
</script>
