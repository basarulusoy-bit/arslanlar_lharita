<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arslanlar Jewels — Zemin Kat Planı</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#C9A96E;--black:#0A0A0A;--b2:#111;--b3:#1A1A1A;--white:#F5F0E8;--wd:rgba(245,240,232,0.6);--border:rgba(201,169,110,0.2);}
body{background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:300;}
.header{padding:16px 24px;background:var(--b2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;}
.header h1{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--gold);}
.header p{font-size:10px;color:var(--wd);letter-spacing:1px;}
.legend{display:flex;gap:16px;margin-left:auto;}
.leg{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--wd);letter-spacing:.5px;}
.leg-dot{width:10px;height:10px;border-radius:2px;}
.controls{padding:10px 24px;background:var(--b3);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;}
.fbtn{background:none;border:1px solid var(--border);color:var(--wd);padding:5px 12px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .2s;}
.fbtn.active,.fbtn:hover{background:rgba(201,169,110,.15);border-color:var(--gold);color:var(--gold);}
.stats{display:flex;gap:16px;margin-left:auto;font-size:10px;}
.stat{color:var(--wd);}.stat span{color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:16px;}
.plan-wrap{overflow:auto;padding:16px;background:var(--black);}
svg.floorplan{background:#0f0f0f;border:1px solid var(--border);display:block;}
.unit{cursor:pointer;transition:opacity .15s;}
.unit:hover{opacity:.75;}
.unit.hidden{display:none;}
.unit-lbl{font-size:6px;fill:rgba(245,240,232,.7);text-anchor:middle;dominant-baseline:central;pointer-events:none;font-family:Montserrat,sans-serif;}
.panel{position:fixed;right:0;top:0;bottom:0;width:280px;background:var(--b2);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .3s;z-index:10;display:flex;flex-direction:column;}
.panel.open{transform:none;}
.panel-hdr{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-no{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold);}
.panel-type{font-size:9px;letter-spacing:2px;color:var(--wd);margin-top:2px;}
.panel-close{background:none;border:none;color:var(--wd);font-size:18px;cursor:pointer;}
.panel-body{padding:18px;flex:1;}
.pi{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(245,240,232,.05);}
.pi-l{font-size:9px;letter-spacing:1.5px;color:var(--wd);text-transform:uppercase;}
.pi-v{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--white);}
.pi-v.gold{color:var(--gold);}
.status-badge{display:inline-block;padding:4px 12px;font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;}
.s-available{background:rgba(93,189,132,.15);color:#5DBD84;border:1px solid rgba(93,189,132,.3);}
.s-reserved{background:rgba(232,169,110,.12);color:#E8A96E;border:1px solid rgba(232,169,110,.25);}
.s-sold{background:rgba(232,112,112,.1);color:#E87070;border:1px solid rgba(232,112,112,.2);}
.panel-btns{padding:16px 18px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.pbtn{padding:10px;text-align:center;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;font-family:'Montserrat',sans-serif;transition:all .2s;}
.pbtn-gold{background:var(--gold);color:var(--black);}
.pbtn-gold:hover{background:#E8CC84;}
.pbtn-ghost{background:transparent;border:1px solid var(--border);color:var(--wd);}
.pbtn-ghost:hover{border-color:var(--gold);color:var(--gold);}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>

const SUPABASE_URL = 'https://lbmzjhvgunkitpatijut.supabase.co';
const SUPABASE_KEY = 'sb_publishable_59-PLGkxMNiaL_lKUXyDbQ_ubzKmEcY';

let unitsStatus = {};
let curFilter = 'all';
let selectedNo = null;

// Supabase'den durum yükle
async function loadStatus() {
  try {
    const r = await fetch(SUPABASE_URL + '/rest/v1/jewels_units?select=unit_no,status&type=eq.1%2B1%20Loft%20Bah%C3%A7eli', {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
    });
    const data = await r.json();
    if (Array.isArray(data)) {
      data.forEach(u => unitsStatus[u.unit_no] = u.status);
    }
  } catch(e) {}
  renderPlan();
}

const colorMap = {available:'#5DBD84', reserved:'#E8A96E', sold:'#E87070'};
const statusLabel = {available:'Boş', reserved:'Rezerve', sold:'Satıldı'};

function renderPlan() {
  const svg = document.getElementById('planSvg');
  let html = '';
  let cntB=0, cntR=0, cntS=0;
  
  UNITS_DATA.forEach(u => {
    const status = unitsStatus[u.no] || 'available';
    if (status==='available') cntB++;
    else if (status==='reserved') cntR++;
    else cntS++;
    
    const color = colorMap[status];
    const pts = u.pts.map(p => p[0]+','+p[1]).join(' ');
    const hidden = (curFilter !== 'all' && curFilter !== status) ? ' hidden' : '';
    
    html += `<g class="unit${hidden}" data-no="${u.no}" data-status="${status}" onclick="selectUnit('${u.no}')">
      <polygon points="${pts}" fill="${color}" fill-opacity="0.7" stroke="${color}" stroke-width="0.8"/>
      <text class="unit-lbl" x="${u.cx}" y="${u.cy}">${u.no}</text>
    </g>`;
  });
  
  svg.innerHTML = html;
  document.getElementById('cntB').textContent = cntB;
  document.getElementById('cntR').textContent = cntR;
  document.getElementById('cntS').textContent = cntS;
  document.getElementById('cntT').textContent = UNITS_DATA.length;
}

function filterStatus(s, btn) {
  curFilter = s;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.unit').forEach(el => {
    const st = el.dataset.status;
    el.classList.toggle('hidden', s !== 'all' && s !== st);
  });
}

function selectUnit(no) {
  selectedNo = no;
  const status = unitsStatus[no] || 'available';
  document.getElementById('pNo').textContent = 'Daire ' + no;
  document.getElementById('pNo2').textContent = no;
  const sc = {available:'s-available', reserved:'s-reserved', sold:'s-sold'};
  document.getElementById('pStatus').innerHTML = '<span class="status-badge ' + sc[status] + '">' + statusLabel[status] + '</span>';
  
  let btns = '';
  if (status === 'available') {
    btns = '<button class="pbtn pbtn-gold" onclick="reserveUnit()">REZERVE ET</button>';
    btns += '<button class="pbtn pbtn-ghost" onclick="openContract()">SÖZLEŞME HAZIRLA</button>';
  } else if (status === 'reserved') {
    btns = '<button class="pbtn pbtn-gold" onclick="openContract()">SÖZLEŞME HAZIRLA</button>';
    btns += '<button class="pbtn pbtn-ghost" style="color:var(--red-ish)" onclick="cancelReserve()">Rezervasyonu Kaldır</button>';
  } else {
    btns = '<button class="pbtn pbtn-ghost" disabled style="opacity:.4">Satıldı</button>';
  }
  document.getElementById('pBtns').innerHTML = btns;
  document.getElementById('detailPanel').classList.add('open');
  
  // Highlight
  document.querySelectorAll('.unit polygon').forEach(p => p.setAttribute('stroke-width','0.8'));
  const sel = document.querySelector('.unit[data-no="'+no+'"] polygon');
  if (sel) sel.setAttribute('stroke-width','2.5');
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('.unit polygon').forEach(p => p.setAttribute('stroke-width','0.8'));
}

async function reserveUnit() {
  if (!selectedNo) return;
  try {
    await fetch(SUPABASE_URL + '/rest/v1/jewels_units?unit_no=eq.' + selectedNo + '&type=eq.1%2B1%20Loft%20Bah%C3%A7eli', {
      method: 'PATCH',
      headers: {'apikey': SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body: JSON.stringify({status:'reserved'})
    });
  } catch(e) {}
  unitsStatus[selectedNo] = 'reserved';
  renderPlan();
  selectUnit(selectedNo);
}

function openContract() {
  if (window.opener || window.parent !== window) {
    window.parent.postMessage({type:'jwOpenModal', unitNo: selectedNo, unitType:'1+1 Loft Bahçeli', floor:0}, '*');
  } else {
    alert('Sözleşme için acenta panelinden giriş yapın.');
  }
}

loadStatus();
</script>
