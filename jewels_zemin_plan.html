<head>

<title>Jewels ZEMİN KAT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#C9A96E;--black:#0A0A0A;--b2:#111;--white:#F5F0E8;--wd:rgba(245,240,232,0.6);--border:rgba(201,169,110,0.2);--green:#5DBD84;--orange:#E8A96E;--red:#E87070;}
html,body{height:100%;overflow:hidden;background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:300;}
.wrap{display:flex;flex-direction:column;height:100%;}
.toolbar{flex-shrink:0;padding:6px 10px;background:var(--b2);border-bottom:1px solid var(--border);display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.kat-title{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);margin-right:6px;white-space:nowrap;}
.fbtn{background:none;border:1px solid var(--border);color:var(--wd);padding:3px 8px;font-size:8px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .15s;white-space:nowrap;}
.fbtn.active,.fbtn:hover{background:rgba(201,169,110,.18);border-color:var(--gold);color:var(--gold);}
.legend{display:flex;gap:8px;margin-left:auto;font-size:8px;color:var(--wd);align-items:center;}
.ld{width:8px;height:8px;border-radius:1px;display:inline-block;margin-right:2px;vertical-align:middle;}
.statsbar{flex-shrink:0;display:flex;gap:12px;padding:3px 10px;background:rgba(0,0,0,.4);font-size:9px;color:var(--wd);border-bottom:1px solid var(--border);}
.st span{font-family:'Cormorant Garamond',serif;font-size:14px;margin-left:2px;color:var(--gold);}
.body{flex:1;display:flex;overflow:hidden;min-height:0;}

/* SVG container — fills remaining space, no scroll */
.plan-area{flex:1;overflow:hidden;padding:6px;display:flex;align-items:stretch;}
svg.fp{
  display:block;
  width:100%;
  height:100%;
  max-width:100%;
  max-height:100%;
}

.unit{cursor:pointer;}
.unit polygon{transition:fill-opacity .1s;}
.unit:hover polygon{fill-opacity:1!important;}
.unit.dim{opacity:.18;pointer-events:none;}
.ulbl{font-size:82.0px;fill:#000;fill-opacity:0.8;text-anchor:middle;dominant-baseline:central;pointer-events:none;font-weight:700;}

/* Right panel */
.rpanel{width:0;overflow:hidden;transition:width .22s;background:var(--b2);border-left:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;}
.rpanel.open{width:240px;}
.rp-hdr{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
.rp-no{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold);line-height:1;}
.rp-tip{font-size:9px;letter-spacing:1.5px;color:var(--wd);text-transform:uppercase;margin-top:2px;}
.rp-close{background:none;border:none;color:var(--wd);font-size:16px;cursor:pointer;padding:2px 4px;line-height:1;}
.rp-close:hover{color:var(--white);}
.rp-body{flex:1;padding:10px 14px;overflow-y:auto;}
.sbadge{display:inline-block;padding:3px 10px;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;border-radius:2px;}
.s-av{background:rgba(93,189,132,.15);color:var(--green);border:1px solid rgba(93,189,132,.3);}
.s-pe{background:rgba(201,169,110,.15);color:var(--gold);border:1px solid rgba(201,169,110,.3);}
.s-re{background:rgba(232,169,110,.12);color:var(--orange);border:1px solid rgba(232,169,110,.25);}
.s-so{background:rgba(232,112,112,.1);color:var(--red);border:1px solid rgba(232,112,112,.2);}
.pi{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(245,240,232,.05);}
.pi-l{font-size:8px;letter-spacing:1px;color:var(--wd);text-transform:uppercase;}
.pi-v{font-family:'Cormorant Garamond',serif;font-size:15px;}
.pi-v.gold{color:var(--gold);font-size:17px;}
.rp-btns{padding:10px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;}
.rbtn{padding:9px;text-align:center;font-size:8px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;font-family:'Montserrat',sans-serif;font-weight:500;transition:all .2s;}
.rbtn-gold{background:var(--gold);color:#000;}
.rbtn-gold:hover{background:#E8CC84;}
.rbtn-ghost{background:transparent;border:1px solid var(--border);color:var(--wd);}
.rbtn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.rbtn:disabled{opacity:.3;cursor:default;}
.rform{padding:10px 14px;border-top:1px solid var(--border);display:none;}
.rform.open{display:block;}
.rform-lbl{font-size:8px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
.rfi{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(201,169,110,.2);color:var(--white);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:300;padding:6px 2px;outline:none;margin-bottom:6px;}
.rfi::placeholder{color:rgba(245,240,232,.2);}
.rfi:focus{border-bottom-color:var(--gold);}
</style>
</head>

const CM={available:'#5DBD84',pending:'#C9A96E',pending_sale:'#C9A96E',reserved:'#E8A96E',sold:'#E87070'};
const SL={available:'Bos',pending:'Onay Bekliyor',pending_sale:'Onay Bekliyor',reserved:'Rezerve',sold:'Satildi'};
const SC={available:'s-av',pending:'s-pe',pending_sale:'s-pe',reserved:'s-re',sold:'s-so'};
let US={},CF='all',SEL=null;

async function load(){
  try{
    const r=await fetch(SB+'/rest/v1/jewels_units?select=unit_no,status,customer_name,reserved_by_name&type=eq.'+encodeURIComponent(UT),{headers:{'apikey':SK,'Authorization':'Bearer '+SK}});

    if(Array.isArray(d))d.forEach(u=>US[u.unit_no]={status:u.status||'available',cus:u.customer_name,agency:u.reserved_by_name});
  }catch(e){}
  render();
}

function render(){
  const svg=document.getElementById('svg'); const _bgEl=svg.querySelector('#bg-layer');
  let b=0,p=0,r=0,s=0,h='';
  UD.forEach(u=>{
    const d=US[u.no]||{};
    const st=d.status||'available';
    if(st==='available')b++;else if(st==='pending'||st==='pending_sale')p++;else if(st==='reserved')r++;else s++;
    const c=CM[st]||'#5DBD84';
    const pts=u.pts.map(p=>p[0]+','+p[1]).join(' ');
    const dim=(CF!=='all'&&CF!==st&&!(CF==='pending'&&st==='pending_sale'))?' dim':'';
    const sw=(SEL===u.no)?'80':'20';
    h+=`<g class="unit${dim}" data-no="${u.no}" data-st="${st}" onclick="sel('${u.no}')"><polygon points="${pts}" fill="${c}" fill-opacity="0.85" stroke="rgba(0,0,0,0.4)" stroke-width="${sw}"/><text class="ulbl" x="${u.cx}" y="${u.cy}">${u.no}</text></g>`;
  });
  svg.innerHTML=h;
if(_bgEl&&!svg.querySelector('#bg-layer'))svg.insertBefore(_bgEl,svg.firstChild);
  document.getElementById('cB').textContent=b;
  document.getElementById('cP').textContent=p;
  document.getElementById('cR').textContent=r;
  document.getElementById('cS').textContent=s;
  document.getElementById('cT').textContent=UD.length;
}

function flt(v,btn){CF=v;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.unit').forEach(el=>el.classList.toggle('dim',v!=='all'&&v!==el.dataset.st&&!(v==='pending'&&el.dataset.st==='pending_sale')));}

function sel(no){
  SEL=no;
  const d=US[no]||{};const st=d.status||'available';
  document.getElementById('pNo').textContent='Daire '+no;
  document.getElementById('pNo2').textContent=no;
  document.getElementById('pBadge').innerHTML='<span class="sbadge '+SC[st]+'">'+SL[st]+'</span>';

  if(d.cus)extra+='<div class="pi"><span class="pi-l">Musteri</span><span class="pi-v" style="font-size:12px">'+d.cus+'</span></div>';
  if(d.agency)extra+='<div class="pi"><span class="pi-l">Acenta</span><span class="pi-v" style="font-size:11px;color:var(--wd)">'+d.agency+'</span></div>';
  document.getElementById('pExtra').innerHTML=extra;
  var btns='';
  if(st==='available')btns='<button class="rbtn rbtn-gold" onclick="showForm()">REZERVASYON TALEBI</button><button class="rbtn rbtn-ghost" onclick="reqSale()">SATIS TALEBI</button>';

  else btns='<button class="rbtn rbtn-ghost" disabled>Satildi</button>';
  document.getElementById('pBtns').innerHTML=btns;
  document.getElementById('rform').classList.remove('open');
  document.getElementById('rpanel').classList.add('open');
var _t2=document.getElementById('pTip');var _a2=document.getElementById('pAlan');if(_t2&&_a2){var _tv=_t2.textContent;if(_tv.indexOf('Bah')>-1)_a2.textContent='45-50 m2';else if(_tv.indexOf('bleks')>-1)_a2.textContent='50-55 m2';else if(_tv.indexOf('Loft')>-1)_a2.textContent='40-45 m2';else _a2.textContent='-';}

}

function closePanel(){SEL=null;document.getElementById('rpanel').classList.remove('open');document.getElementById('rform').classList.remove('open');document.querySelectorAll('.unit polygon').forEach(p=>p.setAttribute('stroke-width','20'));}

function showForm(){document.getElementById('rform').classList.add('open');document.getElementById('rfName').focus();document.getElementById('pBtns').innerHTML='<button class="rbtn rbtn-gold" onclick="submitReserve()">TALEP GONDER</button><button class="rbtn rbtn-ghost" onclick="document.getElementById(\'rform\').classList.remove(\'open\')">Iptal</button>';}

async function submitReserve(){
  var name=document.getElementById('rfName').value.trim();
  var tel=document.getElementById('rfTel').value.trim();
  if(!name||!tel){alert('Ad ve telefon zorunludur.');return;}
  var note=document.getElementById('rfNote').value.trim();
  try{await fetch(SB+'/rest/v1/jewels_units?unit_no=eq.'+SEL+'&type=eq.'+encodeURIComponent(UT),{method:'PATCH',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({status:'pending',customer_name:name,customer_tel:tel,reservation_note:note,reserved_at:new Date().toISOString()})});}catch(e){}
  US[SEL]={status:'pending',cus:name};render();sel(SEL);
  document.getElementById('rform').classList.remove('open');
}

async function reqSale(){
  try{await fetch(SB+'/rest/v1/jewels_units?unit_no=eq.'+SEL+'&type=eq.'+encodeURIComponent(UT),{method:'PATCH',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({status:'pending_sale',reserved_at:new Date().toISOString()})});}catch(e){}
  US[SEL]={...US[SEL],status:'pending_sale'};render();sel(SEL);
  window.parent.postMessage({type:'jwContract',no:SEL,unitType:UT,floor:0}, '*');
}

async function cancelReq(){
  try{await fetch(SB+'/rest/v1/jewels_units?unit_no=eq.'+SEL+'&type=eq.'+encodeURIComponent(UT),{method:'PATCH',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({status:'available',customer_name:null,customer_tel:null,reservation_note:null,reserved_at:null})});}catch(e){}
  US[SEL]={status:'available'};render();sel(SEL);
}
